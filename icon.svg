<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E130C"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </radialGradient>
    
    <!-- Heat/Fire Gradient -->
    <linearGradient id="heatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9F00"/>
      <stop offset="50%" stop-color="#FF5100"/>
      <stop offset="100%" stop-color="#FF0055"/>
    </linearGradient>

    <!-- Ring Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Obsidian Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGlow)"/>
  
  <!-- Outer Glowing Air Fryer Dial Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#221A1A" stroke-width="12"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#heatGrad)" stroke-width="8" filter="url(#glow)" opacity="0.85"/>

  <!-- Inside Rotating Vortex / Fan Blades (Procedural Cooker Theme) -->
  <g transform="translate(256,256)">
    <!-- Central Heat Core -->
    <circle cx="0" cy="0" r="42" fill="url(#heatGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="16" fill="#FFFFFF"/>
    
    <!-- Dynamic Curved Heat Blades -->
    <path d="M 0 -42 C 30 -42, 60 -20, 68 15 C 50 10, 20 5, 0 0 Z" fill="url(#heatGrad)" opacity="0.9"/>
    <path d="M 0 42 C -30 42, -60 20, -68 -15 C -50 -10, -20 -5, 0 0 Z" fill="url(#heatGrad)" opacity="0.9"/>
    <path d="M 42 0 C 42 30, 20 60, -15 68 C -10 50, -5 20, 0 0 Z" fill="url(#heatGrad)" opacity="0.9"/>
    <path d="M -42 0 C -42 -30, -20 -60, 15 -68 C 10 -50, 5 -20, 0 0 Z" fill="url(#heatGrad)" opacity="0.9"/>
    
    <!-- Dynamic Outer Heat Radiating Arcs -->
    <path d="M -120 -60 A 130 130 0 0 1 -60 -120" fill="none" stroke="url(#heatGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
    <path d="M 60 120 A 130 130 0 0 1 120 60" fill="none" stroke="url(#heatGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
    <path d="M 120 -60 A 130 130 0 0 1 60 -120" fill="none" stroke="url(#heatGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
    <path d="M -60 120 A 130 130 0 0 1 -120 60" fill="none" stroke="url(#heatGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.6"/>
  </g>

  <!-- Digital Timer Tick Indications -->
  <line x1="256" y1="28" x2="256" y2="44" stroke="#FF9F00" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="468" x2="256" y2="484" stroke="#221A1A" stroke-width="8" stroke-linecap="round"/>
  <line x1="28" y1="256" x2="44" y2="256" stroke="#221A1A" stroke-width="8" stroke-linecap="round"/>
  <line x1="468" y1="256" x2="484" y2="256" stroke="#221A1A" stroke-width="8" stroke-linecap="round"/>
</svg>
